framework:
    workflows:
        rendez_vous:
            type: state_machine
            audit_trail:
                enabled: true
            marking_store:
                type: method
                property: statut
            supports:
                - App\Entity\RendezVous
            initial_marking: en_attente
            places:
                - en_attente
                - reserve
                - confirme
                - reception
                - en_cours
                - termine
                - restitue
                - facture
                - paye
                - annule
                # LOT 3 — new places
                - en_attente_pieces
                - en_attente_reprise
                - en_gardiennage
                - restitue_partiel
                - no_show
            transitions:
                reserver:
                    from: en_attente
                    to: reserve
                confirmer:
                    from: [en_attente, reserve]
                    to: confirme
                reception:
                    from: confirme
                    to: reception
                start_travail:
                    from: reception
                    to: en_cours
                terminer:
                    from: en_cours
                    to: termine
                restituer:
                    from: termine
                    to: restitue
                facturer:
                    from: [termine, restitue, restitue_partiel]
                    to: facture
                payer:
                    from: facture
                    to: paye
                annuler:
                    from: [en_attente, reserve, confirme]
                    to: annule
                # LOT 3 — new transitions
                declarer_no_show:
                    from: [confirme, reception]
                    to: no_show
                reporter:
                    from: [reception, no_show]
                    to: confirme
                attendre_pieces:
                    from: [reception, en_cours]
                    to: en_attente_pieces
                reprendre_apres_pieces:
                    from: en_attente_pieces
                    to: en_cours
                mettre_en_attente_reprise:
                    from: en_cours
                    to: en_attente_reprise
                reprendre_demain:
                    from: en_attente_reprise
                    to: en_cours
                passer_gardiennage:
                    from: [termine, en_attente_pieces, restitue_partiel]
                    to: en_gardiennage
                sortir_gardiennage:
                    from: en_gardiennage
                    to: en_cours
                restituer_partiel:
                    from: [en_cours, termine]
                    to: restitue_partiel
                retour_garantie:
                    from: [restitue, paye]
                    to: en_cours
