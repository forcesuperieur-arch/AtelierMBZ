## 🐛 Dépannage

### Problèmes courants

**Page blanche / JS ne charge pas:**
- Vérifier console (F12) pour erreurs
- Vérifier Network → Status 200 pour les JS
- Vider cache: Ctrl+F5

**"Non authentifié":**
- Token expiré → redirection vers /login.html
- Vérifier `localStorage.token`

**Erreur 500:**
- Vérifier logs backend: `docker logs atelier-backend`

**Données pas à jour:**
- Vérifier que `loadPlanning()` est appelée
- Vérifier les timestamps des requêtes dans Network

