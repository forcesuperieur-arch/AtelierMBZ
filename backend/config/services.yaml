# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            string $projectDir: '%kernel.project_dir%'
            Symfony\Component\RateLimiter\RateLimiterFactory $publicBookingLimiter: '@limiter.public_booking'
            Symfony\Component\RateLimiter\RateLimiterFactory $publicSuiviLimiter: '@limiter.public_suivi'
            Symfony\Component\RateLimiter\RateLimiterFactory $publicCompanionLimiter: '@limiter.public_companion'
            Symfony\Component\RateLimiter\RateLimiterFactory $publicVoCompanionLimiter: '@limiter.public_vo_companion'
            Symfony\Component\RateLimiter\RateLimiterFactory $publicDemandeLimiter: '@limiter.public_demande'
            Symfony\Component\RateLimiter\RateLimiterFactory $companionUploadLimiter: '@limiter.companion_upload'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\EventListener\TenantSetterListener:
        tags:
            - { name: doctrine.event_listener, event: prePersist }

    App\Service\ConfigEncryptionService:
        arguments:
            $appSecret: '%kernel.secret%'
