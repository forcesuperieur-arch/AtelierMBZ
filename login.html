<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur de Devis - Atelier Moto Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/dashboard.html">🏍️ Atelier Moto Pro</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/dashboard.html">← Retour au Dashboard</a>
            </div>
        </div>
    </nav>
    <div class="container py-4">
        <h1 class="mb-4">🧮 Calculateur de Devis</h1>
        
        <div class="card shadow-sm">
            <div class="card-body">
                <!-- Sélection Client -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Client</label>
                        <select id="clientSelect" class="form-select">
                            <option value="">-- Choisir un client --</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Véhicule</label>
                        <select id="vehiculeSelect" class="form-select">
                            <option value="">-- Choisir un véhicule --</option>
                        </select>
                    </div>
                </div>
                
                <!-- Lignes du devis -->
                <h5 class="mt-4">Lignes du devis</h5>
                <table class="table table-bordered">
                    <thead class="table-light">
                        <tr>
                            <th>Type</th>
                            <th>Description</th>
                            <th>Qté</th>
                            <th>Prix unitaire HT</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="lignesBody">
                        <!-- Lignes ajoutées dynamiquement -->
                    </tbody>
                </table>
                
                <div class="mb-3">
                    <button class="btn btn-outline-primary me-2" onclick="ajouterLigne('piece')">+ 🔧 Pièce</button>
                    <button class="btn btn-outline-secondary" onclick="ajouterLigne('main_oeuvre')">+ 👨‍🔧 Prestation</button>
                </div>
                
                <!-- Bouton Calculer -->
                <button class="btn btn-success btn-lg w-100" onclick="calculerDevis()">🧮 Calculer le devis</button>
                
                <!-- Résultat -->
                <div id="resultat" class="mt-4 p-4 bg-white border rounded" style="display:none">
                    <h4 class="mb-3">📊 Résultat du calcul</h4>
                    <div class="row">
                        <div class="col-md-4 text-center">
                            <div class="text-muted">Total HT</div>
                            <div id="totalHt" class="fs-4 fw-bold">0.00 €</div>
                        </div>
                        <div class="col-md-4 text-center">
                            <div class="text-muted">TVA (20%)</div>
                            <div id="tva" class="fs-4 fw-bold">0.00 €</div>
                        </div>
                        <div class="col-md-4 text-center">
                            <div class="text-muted">Total TTC</div>
                            <div id="totalTtc" class="fs-2 fw-bold text-success">0.00 €</div>
                        </div>
                    </div>
                    <div id="detailLignes" class="mt-3"></div>
                </div>
            </div>
        </div>
        
        <div class="mt-3">
            <a href="/dashboard.html" class="btn btn-outline-secondary">← Retour au dashboard</a>
        </div>
    </div>
    
    <script src="devis.js"></script>
</body>
</html>
