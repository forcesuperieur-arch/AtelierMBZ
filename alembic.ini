## ⚙️ Configuration Docker

### Services
```yaml
backend:  # FastAPI
  port: 8000
  volumes:
    - ./backend:/app
    - ./frontend:/app/static  # Montage frontend

db:  # PostgreSQL
  port: 5432
  volumes:
    - postgres_data:/var/lib/postgresql/data
```

### URLs d'accès
- Application: `http://localhost:8080`
- API: `http://localhost:8000`
- Base de données: `postgresql://atelier:atelier@localhost:5432/atelier_moto`

