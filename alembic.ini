## 📄 Pages Frontend

### 1. `/login.html` - Page de connexion
**Fichier:** `frontend/login.html`  
**JS:** Inline  
**Description:** Page de connexion unique pour tous les rôles

**Fonctionnalités:**
- Formulaire login (username/password)
- Redirection automatique selon le rôle
- Design responsive jaune/noir (#ffd700 / #1a1a1a)

---

### 2. `/dashboard.html` - Tableau de bord
**Fichier:** `frontend/dashboard.html`  
**JS:** `frontend/dashboard.js`  
**Accès:** admin, receptionnaire

**Sections:**
- **Dashboard:** Stats rapides, RDV du jour
- **Rendez-vous:** Liste complète, filtres
- **Clients:** Gestion clients
- **Mécaniciens:** Stats productivité, occupation ponts
- **Tarifs:** Gestion prestations
- **Statistiques:** CA, RDV, occupation
- **Ordres de réparation:** Liste OR

**Navigation:**
```javascript
showSection('dashboard|rendezvous|clients|mecaniciens|tarifs|statistiques|ordres')
```

---

### 3. `/planning.html` - Planning RDV
**Fichier:** `frontend/planning.html`  
**JS:** `frontend/planning.js`  
**Accès:** Tous (lecture seule pour mécaniciens)

**Vues:**
- **Vue Jour:** Grille horaire 8h-19h, 30min intervalles
- **Vue Semaine:** Grille 7 jours x ponts

**Fonctionnalités:**
- Drag & drop RDV (admin/reception uniquement)
- Assignation mécanicien + pont
- Détection conflits
- **Bouton "Prendre"** pour mécaniciens (s'auto-assigner avec leur pont)
- **Blocage** si mécanicien absent

**Variables globales:**
```javascript
currentVue = 'jour' // Vue par défaut
currentDate = Date
planningData = { rendez_vous, ponts, mecaniciens }
currentUser = { id, username, role } // Détecté au chargement
```

**API utilisées:**
```
GET /api/planning?date=YYYY-MM-DD
GET /api/planning/semaine?date_debut=YYYY-MM-DD
PUT /api/rendez-vous/{id}  // Déplacer/assigner
GET /api/absences?date=YYYY-MM-DD  // Vérification absences
```

**Logique métier:**
- Mécanicien connecté → Voir planning en lecture seule
- Bouton "Prendre" visible uniquement sur RDV en attente
- Assignation auto: mécanicien + son pont
- Vérification absence avant assignation

---

### 4. `/technicien.html` - Espace Mécanicien
**Fichier:** `frontend/technicien.html`  
**JS:** `frontend/technicien.js`  
**Accès:** mécanicien uniquement

**Fonctionnalités:**
- Liste des RDV assignés au mécanicien
- Fiche intervention (points de contrôle)
- Suivi temps de travail (démarrer/arrêter)
- Ajout pièces utilisées
- Signature client
- **Bouton "Voir le planning"** → Accès au planning en lecture seule

**Navigation:**
- Espace travail (fiches d'intervention)
- Planning (vue uniquement, pas de modification)

**API utilisées:**
```
GET /api/rendez-vous?mecanicien_id={id}
PUT /api/rendez-vous/{id}/temps  // Suivi temps
POST /api/rendez-vous/{id}/pieces
```

---

### 5. `/mecaniciens-v2.html` - Gestion Mécaniciens & Ponts
**Fichier:** `frontend/mecaniciens-v2.html`  
**JS:** `frontend/mecaniciens-v2.js`  
**Accès:** admin, receptionnaire

**Fonctionnalités:**
- CRUD Mécaniciens (nom, prénom, spécialités, couleur)
- CRUD Ponts (nom, type, capacité)
- **Association Pont-Mécanicien:** Assigner un mécanicien à un pont
- Gestion des absences (date début/fin, motif)
- Stats en temps réel

**Logique métier:**
- Si mécanicien absent → pont marqué "Mécanicien absent" (orange)
- Pont disponible uniquement si: actif + mécanicien présent

**Variables globales:**
```javascript
mecaniciens = []
ponts = []
absences = []
```

**API utilisées:**
```
GET /api/mecaniciens
GET /api/ponts
GET /api/absences?date=YYYY-MM-DD
POST /api/mecaniciens
POST /api/ponts
POST /api/absences
```

---

### 6. `/admin.html` - Gestion Utilisateurs
**Fichier:** `frontend/admin.html`  
**Accès:** admin uniquement

**Fonctionnalités:**
- CRUD Utilisateurs (username, email, rôle, mot de passe)
- Rôles: admin, receptionnaire, mecanicien
