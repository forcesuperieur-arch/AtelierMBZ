services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-atelier_moto}
      POSTGRES_USER: ${POSTGRES_USER:-atelier}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atelier}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # SECURITY: Do NOT expose DB port in production. Uncomment for local dev only.
    # ports:
    #   - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atelier} -d ${POSTGRES_DB:-atelier_moto}"]
      interval: 5s
      timeout: 3s
      retries: 10

  php:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-atelier}:${POSTGRES_PASSWORD:-atelier}@db:5432/${POSTGRES_DB:-atelier_moto}?serverVersion=15&charset=utf8
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:?APP_SECRET must be set in .env or environment}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in .env or environment}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-http://localhost:3000}
      MAILER_DSN: ${MAILER_DSN:-smtp://mailhog:1025}
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN:-doctrine://default}
      MERCURE_URL: ${MERCURE_URL:-http://mercure:3000/.well-known/mercure}
      MERCURE_PUBLIC_URL: ${MERCURE_PUBLIC_URL:-/.well-known/mercure}
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-ChangeMercureJWTSecretKey2026}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
    volumes:
      - ./backend:/app
      - backend_logos:/app/public/uploads/logos
      - backend_photos:/app/public/uploads/photos
      - backend_signatures:/app/public/uploads/signatures
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  worker:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command: php bin/console messenger:consume async scheduler_default --time-limit=3600 --memory-limit=256M -vv
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-atelier}:${POSTGRES_PASSWORD:-atelier}@db:5432/${POSTGRES_DB:-atelier_moto}?serverVersion=15&charset=utf8
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:?APP_SECRET must be set in .env or environment}
      MAILER_DSN: ${MAILER_DSN:-smtp://mailhog:1025}
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN:-doctrine://default}
    volumes:
      - ./backend:/app
      - backend_logos:/app/public/uploads/logos
      - backend_photos:/app/public/uploads/photos
      - backend_signatures:/app/public/uploads/signatures

  nuxt:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      - php
    environment:
      NUXT_PUBLIC_API_BASE: /api
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - php
      - nuxt
      - mercure
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  mercure:
    image: dunglas/mercure
    restart: unless-stopped
    environment:
      SERVER_NAME: ':3000'
      MERCURE_PUBLISHER_JWT_KEY: '${MERCURE_JWT_SECRET:-ChangeMercureJWTSecretKey2026}'
      MERCURE_SUBSCRIBER_JWT_KEY: '${MERCURE_JWT_SECRET:-ChangeMercureJWTSecretKey2026}'
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins *
        anonymous
        subscriptions
    volumes:
      - mercure_data:/data
      - mercure_config:/config

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    # SECURITY: Do NOT expose port 8025 in production — it shows all emails sent by the app
    # Uncomment the ports section only for local development
    # ports:
    #   - "${MAILHOG_PORT:-8025}:8025"

volumes:
  postgres_data:
  backend_logos:
  backend_photos:
  backend_signatures:
  caddy_data:
  caddy_config:
  mercure_data:
  mercure_config:
