# Override dev uniquement — hot-reload Nuxt sans rebuild d'image.
# Automatiquement chargé par docker compose (priorité sur docker-compose.yml).
# Ne pas commiter si ce fichier contient des valeurs sensibles.
services:
  nuxt:
    build: !reset null
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - nuxt_node_modules:/app/node_modules
    environment:
      NUXT_PUBLIC_API_BASE: /api
      # Polling nécessaire dans Docker (inotify non transmis depuis l'hôte)
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"

volumes:
  nuxt_node_modules:
