## 🔐 Authentification & Rôles

### Lexique RBAC (Sections & Permissions)

Ce lexique sert de référence unique pour l'admin **Roles & droits**.

#### Sections visibles (`sections`)
- `dashboard` : vue d'ensemble atelier
- `rdv` : prise de rendez-vous interne
- `planning` : planning atelier (jour/semaine)
- `ponts` : gestion ponts et mécaniciens
- `or` : ordres de réparation
- `suivi` : suivi live atelier
- `clients` : gestion clients
- `espace-meca` : espace mécanicien
- `admin` : onglets d'administration

#### Permissions actions (`permissions`)
- `billing.view` : voir les factures
- `billing.edit` : éditer la facturation
- `billing.pay` : encaissement / statut payé
- `billing.pdf` : génération PDF facture
- `travaux_supp.review` : valider/refuser travaux supplémentaires
- `rdv.select_atelier` : autoriser le choix multi-atelier (sélecteurs RDV + Planning)
- `users.manage` : gérer les utilisateurs
- `ateliers.manage` : gérer les ateliers
- `roles.manage` : gérer les rôles et droits RBAC
- `config.manage` : config atelier
- `prestations.manage` : prestations / forfaits
- `equipements.manage` : équipements atelier

#### Règles de comportement
- Si une section n'est pas cochée, l'entrée de navigation correspondante est masquée.
- Si `rdv.select_atelier` n'est pas cochée, les sélecteurs atelier RDV/Planning sont cachés.
- Si `rdv.select_atelier` est cochée, le user peut basculer le contexte atelier pour RDV et Planning.

### Système de rôles
| Rôle | Accès | Description |
|------|-------|-------------|
| `admin` | Tout | Gestion complète |
| `receptionnaire` | Dashboard, Planning, Clients | Accueil client, RDV |
| `mecanicien` | `/technicien.html`, `/planning.html` (lecture) | Espace technicien |

### Flow d'authentification
1. Login sur `/login.html`
2. API `/api/auth/login` retourne JWT token + rôle
3. Stockage dans `localStorage.token`
4. Redirection selon le rôle:
   - `mecanicien` → `/technicien.html`
   - Autres → `/dashboard.html`

### API Auth
```
POST /api/auth/login
  Body: username, password
  Response: { access_token, token_type, role }

GET /api/auth/me
  Headers: Authorization: Bearer {token}
  Response: { id, username, email, role }
```

