## 🗄️ Modèles de données (Backend)

### Table `users`
```python
id: Integer (PK)
username: String (unique)
email: String
hashed_password: String
role: String (admin|receptionnaire|mecanicien)
is_active: Integer (0|1)
```

### Table `mecaniciens`
```python
id: Integer (PK)
nom: String
prenom: String
specialites: String
couleur: String (hex)
is_active: Integer (0|1)
# Relation: One-to-One avec user quand rôle = mecanicien
# Note: Le pont est assigné via ponts.mecanicien_id (relation inverse)
```

### Table `ponts`
```python
id: Integer (PK)
nom: String
type_pont: String (moto|scooter)
capacite_kg: Integer
mecanicien_id: Integer (FK → mecaniciens.id, nullable)  # Mecanicien assigné à ce pont
is_active: Integer (0|1)
is_occupied: Boolean (calculé)
# Note: Un pont peut avoir 0 ou 1 mécanicien. Un mécanicien peut être sur 0 ou 1 pont.
```

### Table `absences`
```python
id: Integer (PK)
mecanicien_id: Integer (FK)
date_debut: Date
date_fin: Date
motif: String (conge|maladie|formation|autre)
notes: String
```

### Table `rendez_vous`
```python
id: Integer (PK)
client_id: Integer (FK)
vehicule_id: Integer (FK)
date_rdv: Date
heure_rdv: String
type_intervention: String
duree_estimee: Integer (minutes)
prix_estime: Float
mecanicien_id: Integer (FK, nullable)
pont_id: Integer (FK, nullable)
statut: String (en_attente|confirme|en_cours|termine|annule|facture|paye)
temps_final: Integer (minutes)
prix_final: Float
```

