<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Paddock Logo — Symbol on dark background (for social, splash screen) -->

  <rect x="0" y="0" width="400" height="400" fill="#0c0c0c"/>

  <!-- Circuit centré -->
  <g transform="translate(100, 80) scale(0.95)">
    <!-- Track shadow -->
    <path fill="none" stroke="#D4A843" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.06"
      d="M50,120 L50,55 Q50,20 85,20 L140,20 Q180,20 195,45 Q210,70 195,95 L150,130 Q135,143 135,165 L135,185 Q135,210 110,210 L75,210 Q50,210 50,185 Z"/>

    <!-- Track outline -->
    <path fill="none" stroke="#D4A843" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
      d="M50,120 L50,55 Q50,20 85,20 L140,20 Q180,20 195,45 Q210,70 195,95 L150,130 Q135,143 135,165 L135,185 Q135,210 110,210 L75,210 Q50,210 50,185 Z"/>

    <!-- Start/finish lines -->
    <line x1="40" y1="118" x2="60" y2="118" stroke="#D4A843" stroke-width="1" opacity="0.5"/>
    <line x1="40" y1="122" x2="60" y2="122" stroke="#D4A843" stroke-width="1" opacity="0.5"/>

    <!-- Apex markers -->
    <circle cx="195" cy="70" r="3" fill="#D4A843" opacity="0.8"/>
    <circle cx="135" cy="155" r="2" fill="#D4A843" opacity="0.5"/>
    <circle cx="50" cy="40" r="2" fill="#D4A843" opacity="0.5"/>

    <!-- Position dot -->
    <circle cx="120" cy="20" r="4.5" fill="#D4A843" opacity="0.95"/>
    <circle cx="120" cy="20" r="8" fill="none" stroke="#D4A843" stroke-width="0.6" opacity="0.35"/>
  </g>

  <!-- PADDOCK sous le circuit -->
  <text x="200" y="330" fill="#f2efe8" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="400" letter-spacing="10" text-anchor="middle">PADDOCK</text>

  <line x1="120" y1="342" x2="280" y2="342" stroke="#D4A843" stroke-width="0.4" opacity="0.35"/>

  <text x="200" y="362" fill="#6b6b5e" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="8" letter-spacing="4" font-weight="400" text-anchor="middle">MOTO WORKSHOP</text>
</svg>
