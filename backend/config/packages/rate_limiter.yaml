framework:
    rate_limiter:
        public_booking:
            policy: 'sliding_window'
            # 5/min en prod ; surchargé à 100 en dev (docker-compose) pour que
            # les suites E2E ne s'auto-bloquent pas entre specs (même IP).
            limit: '%env(int:PUBLIC_BOOKING_RATE_LIMIT)%'
            interval: '1 minute'
            lock_factory: 'lock.factory'
        public_suivi:
            policy: 'sliding_window'
            limit: 60
            interval: '1 minute'
            lock_factory: 'lock.factory'
        companion_upload:
            policy: 'sliding_window'
            limit: 20
            interval: '1 minute'
            lock_factory: 'lock.factory'
