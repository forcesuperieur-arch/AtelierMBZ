<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Paddock Logo — Stacked (Square) -->
  <!-- Background: transparent. Place on dark background (#0c0c0c) for best result -->

  <!-- Circuit centré -->
  <g transform="translate(80, 20) scale(0.55)">
    <path fill="none" stroke="#D4A843" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.08"
      d="M50,120 L50,55 Q50,20 85,20 L140,20 Q180,20 195,45 Q210,70 195,95 L150,130 Q135,143 135,165 L135,185 Q135,210 110,210 L75,210 Q50,210 50,185 Z"/>
    <path fill="none" stroke="#D4A843" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
      d="M50,120 L50,55 Q50,20 85,20 L140,20 Q180,20 195,45 Q210,70 195,95 L150,130 Q135,143 135,165 L135,185 Q135,210 110,210 L75,210 Q50,210 50,185 Z"/>
    <line x1="40" y1="118" x2="60" y2="118" stroke="#D4A843" stroke-width="1.4" opacity="0.5"/>
    <line x1="40" y1="122" x2="60" y2="122" stroke="#D4A843" stroke-width="1.4" opacity="0.5"/>
    <circle cx="195" cy="70" r="4" fill="#D4A843" opacity="0.8"/>
    <circle cx="120" cy="20" r="5.5" fill="#D4A843" opacity="0.95"/>
    <circle cx="120" cy="20" r="10" fill="none" stroke="#D4A843" stroke-width="0.8" opacity="0.35"/>
  </g>

  <!-- Wordmark centré -->
  <text x="150" y="195" fill="#f2efe8" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="400" letter-spacing="10" text-anchor="middle">PADDOCK</text>

  <!-- Gold line -->
  <line x1="75" y1="207" x2="225" y2="207" stroke="#D4A843" stroke-width="0.4" opacity="0.35"/>

  <!-- Tagline -->
  <text x="150" y="228" fill="#6b6b5e" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="8" letter-spacing="4" font-weight="400" text-anchor="middle">MOTO WORKSHOP</text>
</svg>
